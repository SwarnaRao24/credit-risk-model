name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx2

      - name: Run tests
        run: pytest tests/ -v --rootdir=.   # ← tells pytest root is project root

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t credit-risk-api:latest .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name api credit-risk-api:latest
          echo "Waiting 20s for startup..."
          sleep 20
          echo "=== CONTAINER LOGS ==="
          docker logs api
          echo "=== END LOGS ==="
          curl -f http://localhost:8000/health
          docker stop api