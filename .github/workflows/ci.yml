name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v --rootdir=.   # ← tells pytest root is project root

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify model is real (not an LFS pointer)
        run: |
          ls -la credit_risk_model.joblib
          if head -c 7 credit_risk_model.joblib | grep -q "version"; then
            echo "ERROR: joblib is still an LFS pointer file"; exit 1
          fi

      - name: Build Docker image
        run: docker build -t credit-risk-api:latest .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name api credit-risk-api:latest
          echo "Waiting 20s for startup..."
          sleep 20
          echo "=== CONTAINER LOGS ==="
          docker logs api
          echo "=== END LOGS ==="
          curl -f http://localhost:8000/health
          docker stop api